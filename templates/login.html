<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Transcriber">
    <meta name="theme-color" content="#111111">
    <title>Transcriber — Login</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <main class="login-page">
        <div class="login-card">
            <div class="login-icon">🎙️</div>
            <h1 class="login-title">Transcriber</h1>
            <p class="login-subtitle">Enter your password to continue</p>
            <form id="login-form">
                <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" required>
                <button type="submit" class="login-btn" id="login-btn">
                    <span>Log In</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </button>
                <p id="login-error" class="login-error hidden">Wrong password</p>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pw = document.getElementById('password-input').value;
            const err = document.getElementById('login-error');
            err.classList.add('hidden');
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password: pw})
                });
                if (res.ok) {
                    window.location.href = '/';
                } else {
                    err.classList.remove('hidden');
                    document.getElementById('password-input').select();
                    const card = document.querySelector('.login-card');
                    card.classList.add('shake');
                    setTimeout(() => card.classList.remove('shake'), 500);
                }
            } catch {
                err.textContent = 'Connection error';
                err.classList.remove('hidden');
            }
        });
        document.getElementById('password-input').focus();
    </script>
</body>
</html>
